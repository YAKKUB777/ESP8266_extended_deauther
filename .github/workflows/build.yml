name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
        
    - name: Build firmware
      run: platformio run
      
    - name: Build filesystem
      run: platformio run --target buildfs
      
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: .pio/build/esp8266/firmware.bin
        
    - name: Upload filesystem
      uses: actions/upload-artifact@v4
      with:
        name: littlefs
        path: .pio/build/esp8266/littlefs.bin